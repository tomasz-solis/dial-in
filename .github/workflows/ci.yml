name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Ruff
        run: uv run ruff check
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        run: uv run pytest
      - name: Synthetic realism validation
        run: uv run python scripts/validate_realism.py data/generated
