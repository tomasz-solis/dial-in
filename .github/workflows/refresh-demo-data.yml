name: Refresh demo data

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-demo-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Low-privilege app role. MIGRATION_DATABASE_URL is optional and only used to
      # discover accounts beyond the demo set (a cross-tenant read); leave it unset
      # for the demo.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
      APP_DATABASE_ROLE: dialin_app
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Scheduled refresh (real weather + demo data)
        # Fetches real weather first, then refreshes demo data so recommendations
        # use the real forecast. Weather-API failures are handled per-account inside
        # the script and never abort the demo refresh.
        run: uv run python scripts/scheduled_refresh.py
