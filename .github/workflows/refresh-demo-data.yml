name: Refresh demo data

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      APP_DATABASE_ROLE: dialin_app
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh synthetic demo data
        run: uv run python scripts/refresh_demo_data.py
