services:
  postgres:
    image: postgres:17
    container_name: dialin-postgres
    environment:
      POSTGRES_DB: dialin
      POSTGRES_USER: dialin_owner
      POSTGRES_PASSWORD: dialin_owner
    ports:
      - "5432:5432"
    volumes:
      - dialin-postgres-data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dialin_owner -d dialin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dialin-postgres-data:
