name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Ruff
        run: uv run ruff check
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        run: uv run pytest
      - name: Generate synthetic demo data
        run: uv run python scripts/generate_synthetic_data.py --seed 20260531 --output data/generated
      - name: Synthetic realism validation
        run: uv run python scripts/validate_realism.py data/generated

  rls:
    # Build Readiness Gate 1 (PRD 21) and assumption 7: prove tenant isolation
    # against a real Postgres, since RLS is enforced by the database, not the app.
    # The default `quality` job skips these tests (no DB); this job runs them.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dialin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dialin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Owner/admin connection migrates and seeds; the dialin_app connection is
      # the low-privilege role the RLS policies actually constrain.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dialin
      TEST_APP_DATABASE_URL: postgresql://dialin_app:dialin_app@localhost:5432/dialin
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Create low-privilege app role
        run: uv run python scripts/ci_create_app_role.py
      - name: RLS isolation tests
        run: uv run pytest tests/test_rls_isolation.py -v
